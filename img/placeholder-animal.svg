<svg width="300" height="300"
    xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="300" fill="#e0e0e0"/>
    <g transform="translate(150, 150)">
        <!-- Cabeça do cachorro -->
        <ellipse cx="0" cy="0" rx="50" ry="55" fill="#999"/>

        <!-- Orelhas -->
        <ellipse cx="-35" cy="-35" rx="20" ry="40" fill="#888" transform="rotate(-20 -35 -35)"/>
        <ellipse cx="35" cy="-35" rx="20" ry="40" fill="#888" transform="rotate(20 35 -35)"/>

        <!-- Olhos -->
        <circle cx="-20" cy="-10" r="8" fill="#fff"/>
        <circle cx="20" cy="-10" r="8" fill="#fff"/>
        <circle cx="-20" cy="-10" r="5" fill="#333"/>
        <circle cx="20" cy="-10" r="5" fill="#333"/>

        <!-- Nariz -->
        <ellipse cx="0" cy="10" rx="8" ry="6" fill="#333"/>

        <!-- Boca -->
        <path d="M 0 10 Q -15 25 -20 20 M 0 10 Q 15 25 20 20" stroke="#333" stroke-width="2" fill="none"/>
    </g>
    <text x="150" y="270" font-family="Arial" font-size="16" fill="#666" text-anchor="middle">Foto não disponível</text>
</svg>